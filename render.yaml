services:
  - type: web
    name: pahadi-tube
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && NODE_ENV=production node src/index.js
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://pahaditube.in
      # Google OAuth - set in Render dashboard (sync: false means it's managed in dashboard)
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
