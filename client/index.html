<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192-v2.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192-v2.png" />
    <meta name="theme-color" content="#14122a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PahadiTube" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      SEO note: <title>, <meta name="description">, <link rel="canonical">,
      Open Graph and Twitter tags are injected per-route by the <SEO>
      component (react-helmet-async) and baked into the prerendered HTML
      under dist/<route>/index.html by scripts/prerender.js. The defaults
      below are used only as a fallback for routes that don't render an
      <SEO> tag (e.g. admin pages).
    -->
    <title>PahadiTube - Garhwali Movies, Songs, Comedy &amp; Folk Stories | Uttarakhand OTT</title>
    <meta name="description" content="PahadiTube is the home of Garhwali entertainment - watch the latest Garhwali movies, songs, comedy, devotional bhajans, folk stories, news and Pahadi podcasts from Uttarakhand, all in one place." />
    <meta name="keywords" content="PahadiTube, Pahadi Tube, Garhwali, Garhwali songs, Garhwali movies, Pahadi songs, Uttarakhand, Kumaoni, Pahadi OTT, Garhwali comedy, Garhwali bhajan, folk stories Uttarakhand, Pahadi music, Pahadi news" />
    <meta name="author" content="PahadiTube" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph / Twitter / canonical defaults are injected per-route by <SEO>; see note above. -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured data: WebSite + Organization (helps Google sitelinks & search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://pahaditube.in/#website",
          "url": "https://pahaditube.in/",
          "name": "PahadiTube",
          "description": "Garhwali movies, songs, comedy, bhajans, folk stories and Pahadi news from Uttarakhand.",
          "inLanguage": ["en", "hi"],
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://pahaditube.in/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://pahaditube.in/#organization",
          "name": "PahadiTube",
          "url": "https://pahaditube.in/",
          "logo": "https://pahaditube.in/icons/icon-512-v2.png",
          "description": "PahadiTube is an OTT platform for Garhwali and Pahadi entertainment from Uttarakhand."
        }
      ]
    }
    </script>
  </head>
  <body class="bg-[#0b0e1a] text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
